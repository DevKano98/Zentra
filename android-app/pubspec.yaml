name: zentra
description: AI call screening with default dialer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Call log
  call_log: ^6.0.1
  flutter_contacts: ^1.1.2

  # URL launcher (outgoing calls + open URLs)
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.1
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true